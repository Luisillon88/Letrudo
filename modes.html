<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Letrudo - Modos</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="website icon" type="PNG" href="Imagenes/Logo-Sopa de letras.png">
</head>
<body>

    <div class="top-bar">
    <div class="logo">
        <img src="Imagenes/Logo-Sopa de letras.png" alt="Letrudo">
    </div>
    <div class="user-info">
      <h2 id="username"></h2>
    </div>
  </div>

  <div class="container">
    <div class="menu-box">

      <button class="btn primary" onclick="selectMode('futbol')">⚽ FÚTBOL</button>
      <button class="btn secondary" onclick="selectMode('f1')">🏎️ F1</button>
      <button class="btn option" onclick="selectMode('paises')">🌍 PAÍSES</button>
      <button class="btn option" onclick="selectMode('normal')">🧠 NORMAL</button>
      <button class="btn option" onclick="selectMode('videojuegos')">🎮 Videojuegos</button>
      <button class="btn option" onclick="selectMode('escuela')">🏫 Escuela</button>

      
      <button class="btn option back-btn" onclick="goBack()">⬅ Volver</button>
    </div>
  </div>

  <script src="modes.js"></script>
</body>
</html>
